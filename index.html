<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Security | 大模型安全官网</title>
    <meta
      name="description"
      content="面向企业大模型与智能体场景的安全官网，展示 Prompt Injection 防护、AI 内容检测与评估发布门禁能力，并提供潜在客户线索收集入口。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="page-grid"></div>
      <header class="site-header">
        <a class="brand" href="#top">
          <span class="brand-mark">LS</span>
          <span class="brand-copy">
            <strong>LLM Security</strong>
            <small id="brand-subtitle"></small>
          </span>
        </a>

        <nav class="site-nav" aria-label="Primary navigation">
          <a id="nav-products" href="#products"></a>
          <a id="nav-workflow" href="#workflow"></a>
          <a id="nav-proof" href="#proof"></a>
          <a id="nav-contact" href="#contact"></a>
        </nav>

        <div class="header-actions">
          <div class="locale-switch" role="group" aria-label="Language switch">
            <button type="button" class="locale-button" data-locale="zh">中文</button>
            <button type="button" class="locale-button" data-locale="en">EN</button>
          </div>
          <a id="header-cta" class="button button-ghost header-cta" href="#contact"></a>
        </div>
      </header>

      <main id="top">
        <section class="hero section reveal">
          <div class="hero-copy">
            <p id="hero-eyebrow" class="eyebrow"></p>
            <h1 id="hero-title"></h1>
            <p id="hero-subtitle" class="hero-subtitle"></p>
            <div class="hero-actions">
              <a id="hero-primary" class="button button-solid" href="#contact"></a>
              <a id="hero-secondary" class="button button-ghost" href="#products"></a>
            </div>
            <ul id="hero-tags" class="hero-tags" aria-label="Core signals"></ul>
          </div>

          <aside class="hero-stage" aria-label="Architecture visual">
            <div class="hero-stage-shell">
              <div class="signal-board-head">
                <p id="signal-board-eyebrow" class="eyebrow"></p>
                <h2 id="signal-board-title"></h2>
              </div>
              <div class="hero-diagram" role="img" aria-label="Security architecture diagram">
                <div class="diagram-glow" aria-hidden="true"></div>
                <div class="diagram-core">
                  <span id="diagram-core-label" class="diagram-core-label"></span>
                  <h3 id="diagram-core-title"></h3>
                  <p id="diagram-core-detail"></p>
                </div>
                <div id="diagram-modules" class="diagram-module-grid"></div>
                <p id="diagram-flow" class="diagram-flow"></p>
              </div>
            </div>
            <div id="hero-signals" class="signal-grid"></div>
          </aside>
        </section>

        <section class="metrics-strip reveal" aria-label="Key metrics">
          <div id="metrics-strip" class="metrics-strip-grid"></div>
        </section>

        <section id="products" class="section reveal">
          <div class="section-heading">
            <p id="products-eyebrow" class="eyebrow"></p>
            <h2 id="products-title"></h2>
            <p id="products-description"></p>
          </div>
          <div id="products-grid" class="card-grid card-grid-large"></div>
        </section>

        <section id="quickstart" class="section quickstart-section reveal">
          <div class="section-heading">
            <p id="quickstart-eyebrow" class="eyebrow"></p>
            <h2 id="quickstart-title"></h2>
            <p id="quickstart-description"></p>
          </div>
          <div class="quickstart-layout">
            <div class="quickstart-block">
              <h3 id="quickstart-steps-title"></h3>
              <div id="quickstart-steps" class="quickstart-steps"></div>
            </div>
            <div class="quickstart-block">
              <h3 id="quickstart-demo-title"></h3>
              <p id="quickstart-demo-description"></p>
              <div class="quickstart-actions">
                <a id="quickstart-demo-button" class="button button-solid" href="#" target="_blank" rel="noopener noreferrer"></a>
                <a id="quickstart-contact-button" class="button button-ghost" href="#contact"></a>
              </div>
            </div>
            <div class="quickstart-block">
              <h3 id="quickstart-outcome-title"></h3>
              <div id="quickstart-outcomes" class="quickstart-outcomes"></div>
            </div>
          </div>
        </section>

        <section id="workflow" class="section workflow-section reveal">
          <div class="section-heading">
            <p id="workflow-eyebrow" class="eyebrow"></p>
            <h2 id="workflow-title"></h2>
            <p id="workflow-description"></p>
          </div>
          <div id="workflow-grid" class="workflow-grid"></div>
        </section>

        <section class="section scenario-section reveal">
          <div class="section-heading">
            <p id="scenarios-eyebrow" class="eyebrow"></p>
            <h2 id="scenarios-title"></h2>
            <p id="scenarios-description"></p>
          </div>
          <div id="scenarios-grid" class="card-grid"></div>
        </section>

        <section id="proof" class="section proof-section reveal">
          <div class="evidence-strip">
            <p id="proof-eyebrow" class="eyebrow"></p>
            <h2 id="proof-title"></h2>
            <p id="proof-summary" class="evidence-summary"></p>
            <div id="proof-badges" class="evidence-badges"></div>
          </div>
        </section>

        <section class="section cta-band reveal">
          <div class="cta-copy">
            <p id="cta-eyebrow" class="eyebrow"></p>
            <h2 id="cta-title"></h2>
            <p id="cta-description"></p>
          </div>
          <a id="cta-button" class="button button-solid" href="#contact"></a>
        </section>

        <section id="contact" class="section contact-section reveal">
          <div class="contact-copy">
            <p id="contact-eyebrow" class="eyebrow"></p>
            <h2 id="contact-title"></h2>
            <p id="contact-description"></p>
            <div id="engagement-grid" class="engagement-grid"></div>
          </div>

          <form id="lead-form" class="lead-form" novalidate>
            <label>
              <span id="label-company"></span>
              <input id="input-company" type="text" name="company" required />
            </label>
            <label>
              <span id="label-name"></span>
              <input id="input-name" type="text" name="name" required />
            </label>
            <label>
              <span id="label-email"></span>
              <input id="input-email" type="email" name="email" required />
            </label>
            <label>
              <span id="label-interest"></span>
              <select id="select-interest" name="interest" required>
                <option id="option-interest-placeholder" value=""></option>
                <option id="option-llm-firewall" value="llm-firewall"></option>
                <option id="option-gendetector" value="gendetector"></option>
                <option id="option-evaluation-gate" value="evaluation-gate"></option>
                <option id="option-full-stack" value="full-stack"></option>
              </select>
            </label>
            <label class="full-width">
              <span id="label-message"></span>
              <textarea id="input-message" name="message" rows="5" required></textarea>
            </label>
            <label class="checkbox-row full-width">
              <input type="checkbox" name="consent" value="yes" required />
              <span id="label-consent"></span>
            </label>
            <div class="form-actions full-width">
              <button id="submit-button" type="submit" class="button button-solid"></button>
              <p id="form-hint" class="form-hint"></p>
            </div>
            <p id="form-status" class="form-status full-width" aria-live="polite"></p>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <div>
          <strong>LLM Security</strong>
          <p id="footer-note"></p>
        </div>
        <p id="footer-tagline"></p>
      </footer>
    </div>

    <script src="./content-zh.js"></script>
    <script src="./content-en.js"></script>
    <script src="./site-content.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
